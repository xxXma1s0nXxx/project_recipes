{% extends 'base.html' %}

{% block title %}Удалить рецепт{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body text-center p-5">
                <i class="bi bi-exclamation-triangle-fill text-danger display-3 mb-3"></i>
                <h3>Удалить рецепт?</h3>
                <p class="text-muted">Вы собираетесь удалить рецепт <strong>«{{ recipe.title }}»</strong>. Это действие необратимо.</p>
                <form method="post" class="d-flex gap-2 justify-content-center mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">
                        <i class="bi bi-trash"></i> Удалить
                    </button>
                    <a href="{% url 'recipe_detail' recipe.pk %}" class="btn btn-outline-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
